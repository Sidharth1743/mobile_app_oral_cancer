<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oral Screening Review</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Oral Screening Review</h1>
          <p id="modelStatus" class="status">Model status pending</p>
        </div>
      </header>

      <section class="workspace">
        <form id="uploadForm" class="panel">
          <div class="panelHeader">
            <h2>Image</h2>
            <button id="analyzeButton" type="submit" disabled>Analyze</button>
          </div>
          <label class="dropzone" for="imageInput">
            <input id="imageInput" name="file" type="file" accept="image/*" />
            <span id="dropText">Select oral crop image</span>
          </label>
          <div class="previewFrame">
            <img id="previewImage" alt="" />
          </div>
        </form>

        <section class="panel resultPanel" aria-live="polite">
          <div class="panelHeader">
            <h2>Result</h2>
            <span id="categoryBadge" class="badge muted">No result</span>
          </div>

          <dl class="resultList">
            <div>
              <dt>Recommendation</dt>
              <dd id="recommendation">-</dd>
            </div>
            <div>
              <dt>Brief Reason</dt>
              <dd id="briefReason">-</dd>
            </div>
            <div>
              <dt>Disclaimer</dt>
              <dd id="disclaimer">-</dd>
            </div>
          </dl>

          <details class="rawBlock">
            <summary>Raw output</summary>
            <pre id="rawOutput"></pre>
          </details>

          <div id="errorBox" class="errorBox" hidden></div>
        </section>
      </section>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
